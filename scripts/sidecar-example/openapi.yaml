openapi: "3.0.0"
info:
  title: Sidecar Integration Test Spec
  version: "1.0.0"

x-faremeter-assets:
  usdc:
    chain: test-local
    token: TEST
    decimals: 6
    recipient: test-receiver

x-faremeter-pricing:
  rates:
    usdc: 1

paths:
  /v1/chat/completions:
    post:
      summary: Two-phase chat completion (JSON response)
      x-faremeter-pricing:
        rules:
          - match: "$"
            authorize: "500"
            capture: "$.response.body.usage.total_tokens"
      responses:
        "200":
          description: Chat completion
          content:
            application/json:
              schema:
                type: object

  /v1/chat/stream:
    post:
      summary: Two-phase streaming completion (SSE response)
      x-faremeter-pricing:
        rules:
          - match: "$"
            authorize: "500"
            capture: "$.response.body.usage.total_tokens"
      responses:
        "200":
          description: Streaming completion
          content:
            text/event-stream:
              schema:
                type: string

  /v1/images/generations:
    post:
      summary: One-phase image generation (no authorize expression)
      x-faremeter-pricing:
        rules:
          - match: "$"
            capture: "1"
      responses:
        "200":
          description: Image generation
          content:
            application/json:
              schema:
                type: object

  /v1/data:
    get:
      summary: Unpaid read (no x-faremeter-pricing)
      responses:
        "200":
          description: Data list
          content:
            application/json:
              schema:
                type: object
    post:
      summary: Paid write (method dispatch test)
      x-faremeter-pricing:
        rules:
          - match: "$"
            authorize: "100"
            capture: "$.response.body.usage.count"
      responses:
        "200":
          description: Data created
          content:
            application/json:
              schema:
                type: object

  /health:
    get:
      summary: Unpaid health check (no x-faremeter-pricing)
      responses:
        "200":
          description: Health status
