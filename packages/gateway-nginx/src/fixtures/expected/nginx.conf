worker_processes auto;

events {
  worker_connections 1024;
}

http {
  lua_shared_dict fm_capture_buffer 10m;
  lua_package_path "/etc/nginx/lua/?.lua;;";
  lua_max_pending_timers 4096;
  lua_max_running_timers 1024;

  upstream backend {
    server 127.0.0.1:4000;
  }

  server {
    listen 8080;

    client_body_buffer_size 10m;
    client_max_body_size 10m;
    proxy_buffering on;

    location = /.well-known/openapi.yaml {
        root /etc/nginx;
        try_files /openapi.yaml =404;
    }

    location = /v1/chat/completions {
      set $proxy_buffering "on";
      proxy_buffering $proxy_buffering;

        access_by_lua_block {
          local op_keys = {
            POST = "POST /v1/chat/completions"
          }
          local sidecar_url = "http://127.0.0.1:4002"

          -- preamble: op_keys, sidecar_url

          local cjson = require("cjson")
          local fm = require("faremeter")

          local method = ngx.req.get_method()
          local op_key = op_keys[method]
          if not op_key then
            return
          end

          ngx.req.read_body()
          local raw_body = ngx.req.get_body_data()
          if not raw_body then
            local file = ngx.req.get_body_file()
            if file then
              local fh = io.open(file, "r")
              if fh then
                raw_body = fh:read("*a")
                fh:close()
              end
            end
          end

          if raw_body then
            local ok = pcall(cjson.decode, raw_body)
            if not ok then
              raw_body = "null"
            end
          else
            raw_body = "null"
          end

          local function flatten_values(tbl)
            local flat = {}
            for k, v in pairs(tbl) do
              if type(v) == "table" then
                flat[k] = table.concat(v, ", ")
              else
                flat[k] = v
              end
            end
            return flat
          end

          local headers = flatten_values(ngx.req.get_headers())
          local query = flatten_values(ngx.req.get_uri_args())

          local payload = '{"operationKey":' .. cjson.encode(op_key)
            .. ',"path":' .. cjson.encode(ngx.var.uri)
            .. ',"method":' .. cjson.encode(method)
            .. ',"body":' .. raw_body
            .. ',"headers":' .. cjson.encode(headers)
            .. ',"query":' .. cjson.encode(query)
            .. '}'

          local res, err = fm.post_to_sidecar(sidecar_url .. "/request", payload)
          if not res then
            ngx.log(ngx.ERR, "sidecar request failed: ", err)
            ngx.status = 502
            ngx.say('{"error":"bad gateway"}')
            return ngx.exit(502)
          end

          if res.status ~= 200 then
            ngx.log(ngx.ERR, "sidecar returned HTTP ", res.status)
            ngx.status = 502
            ngx.say('{"error":"bad gateway"}')
            return ngx.exit(502)
          end

          local ok, gateway = pcall(cjson.decode, res.body)
          if not ok or not gateway then
            ngx.log(ngx.ERR, "sidecar returned invalid JSON")
            ngx.status = 502
            ngx.say('{"error":"bad gateway"}')
            return ngx.exit(502)
          end

          if not gateway.status then
            ngx.log(ngx.ERR, "sidecar response missing status field")
            ngx.status = 502
            ngx.say('{"error":"bad gateway"}')
            return ngx.exit(502)
          end

          local client_status = gateway.status

          if client_status ~= 200 then
            ngx.status = client_status
            if gateway.headers then
              for k, v in pairs(gateway.headers) do
                ngx.header[k] = v
              end
            end
            if gateway.body then
              ngx.say(cjson.encode(gateway.body))
            end
            return ngx.exit(client_status)
          end

          if gateway.headers then
            for k, v in pairs(gateway.headers) do
              ngx.header[k] = v
            end
          end
          ngx.ctx.fm_paid = true
          ngx.ctx.fm_operation_key = op_key
          ngx.ctx.fm_method = method
          ngx.ctx.fm_path = ngx.var.uri
          ngx.ctx.fm_req_headers = headers
          ngx.ctx.fm_req_query = query
          ngx.ctx.fm_req_body = raw_body and cjson.decode(raw_body) or nil

        }

        header_filter_by_lua_block {
          local capture_header_names = {

          }

          -- preamble: capture_header_names

          if not ngx.ctx.fm_paid then
            return
          end

          ngx.ctx.fm_status = ngx.status
          ngx.ctx.fm_captured = {}
          ngx.ctx.fm_captured_headers = {}

          local ct = ngx.header["Content-Type"] or ""
          if ct:find("text/event%-stream") then
            ngx.ctx.fm_is_sse = true
            ngx.var.proxy_buffering = "off"
          else
            ngx.ctx.fm_is_sse = false
          end

          if capture_header_names and #capture_header_names > 0 then
            local headers = ngx.resp.get_headers()
            for _, name in ipairs(capture_header_names) do
              ngx.ctx.fm_captured_headers[name] = headers[name]
            end
          end

        }

        body_filter_by_lua_block {
          local capture_fields = {
            "usage.total_tokens",
            "usage.prompt_tokens"
          }
          local search_keys = {
            "usage"
          }

          -- preamble: capture_fields, search_keys

          local cjson = require("cjson")
          local fm = require("faremeter")

          if not ngx.ctx.fm_paid then
            return
          end

          local function extract_fields(parsed)
            local flat = {}
            for _, path in ipairs(capture_fields) do
              flat[path] = fm.extract_field(parsed, path)
            end
            ngx.ctx.fm_captured = fm.reconstruct_nested(flat)
          end

          local function matches_search_keys(data)
            if #search_keys == 0 then
              return true
            end
            for _, key in ipairs(search_keys) do
              if string.find(data, '"' .. key .. '"', 1, true) then
                return true
              end
            end
            return false
          end

          local chunk = ngx.arg[1]
          local eof = ngx.arg[2]

          if ngx.ctx.fm_is_sse then
            if not ngx.ctx.fm_line_buffer then
              ngx.ctx.fm_line_buffer = { partial_line = "" }
            end

            local events, remaining = fm.parse_sse_chunk(ngx.ctx.fm_line_buffer, chunk)
            ngx.ctx.fm_line_buffer = remaining

            for _, data in ipairs(events) do
              if matches_search_keys(data) then
                local ok, parsed = pcall(cjson.decode, data)
                if ok then
                  extract_fields(parsed)
                end
              end
            end
          else
            if not ngx.ctx.fm_body_chunks then
              ngx.ctx.fm_body_chunks = {}
            end
            table.insert(ngx.ctx.fm_body_chunks, chunk)

            if eof then
              local full = table.concat(ngx.ctx.fm_body_chunks)
              ngx.ctx.fm_body_chunks = nil
              local ok, parsed = pcall(cjson.decode, full)
              if ok then
                extract_fields(parsed)
              end
            end
          end

        }

        log_by_lua_block {
          local sidecar_url = "http://127.0.0.1:4002"

          -- preamble: sidecar_url

          local fm = require("faremeter")

          if not ngx.ctx.fm_paid then
            return
          end

          if ngx.ctx.fm_ws_handled then
            return
          end

          local payload = {
            operationKey = ngx.ctx.fm_operation_key,
            method = ngx.ctx.fm_method,
            path = ngx.ctx.fm_path,
            headers = ngx.ctx.fm_req_headers,
            query = ngx.ctx.fm_req_query,
            body = ngx.ctx.fm_req_body,
            response = {
              status = ngx.ctx.fm_status,
              headers = ngx.ctx.fm_captured_headers or {},
              body = ngx.ctx.fm_captured or {},
            },
          }

          local cjson = require("cjson")
          local json_payload = cjson.encode(payload)

          local capture_key = ngx.var.request_id .. ":" .. ngx.ctx.fm_operation_key

          local ok, err = fm.write_capture(ngx.shared.fm_capture_buffer, capture_key, json_payload, 60)
          if not ok then
            ngx.log(ngx.WARN, "faremeter: failed to write capture to shared_dict: ", err)
            return
          end

          local timer_ok, timer_err = ngx.timer.at(0, fm.flush_capture, capture_key, sidecar_url, ngx.shared.fm_capture_buffer)
          if not timer_ok then
            ngx.log(ngx.WARN, "faremeter: failed to schedule capture flush timer: ", timer_err)
          end

        }

        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

